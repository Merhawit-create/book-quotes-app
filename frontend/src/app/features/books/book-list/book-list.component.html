<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Books</h2>
    <a routerLink="/books/new" class="btn btn-primary">
      <i class="fa-solid fa-plus me-2"></i>
      Add New Book
    </a>
  </div>

  <div class="row g-3">
    <div class="col-md-6 col-lg-4" *ngFor="let book of books">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">{{ book.title }}</h5>
          <p class="card-text mb-1"><strong>Author:</strong> {{ book.author }}</p>
          <p class="card-text"><strong>Published:</strong> {{ book.publishedDate | date:'yyyy-MM-dd' }}</p>
        </div>
        <div class="card-footer d-flex justify-content-between">
          <button class="btn btn-warning btn-sm" (click)="editBook(book.id)">
            <i class="fa-solid fa-pen me-1"></i>Edit
          </button>
          <button class="btn btn-danger btn-sm" (click)="deleteBook(book.id)">
            <i class="fa-solid fa-trash me-1"></i>Delete
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
