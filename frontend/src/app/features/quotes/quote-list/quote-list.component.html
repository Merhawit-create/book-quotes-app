<div class="container mt-4">
  <h2 class="mb-4">My Quotes</h2>

  <div class="card shadow mb-4">
    <div class="card-body">
      <h4>{{ editingId ? 'Edit Quote' : 'Add Quote' }}</h4>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">Quote</label>
          <textarea class="form-control" rows="3" formControlName="text"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Author</label>
          <input type="text" class="form-control" formControlName="author">
        </div>

        <button class="btn btn-success me-2" type="submit">
          <i class="fa-solid fa-floppy-disk me-2"></i>
          Save
        </button>

        <button class="btn btn-secondary" type="button" (click)="resetForm()">
          Cancel
        </button>
      </form>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-md-6" *ngFor="let quote of quotes">
      <div class="card shadow-sm h-100">
        <div class="card-body">
          <blockquote class="blockquote mb-3">
            <p>"{{ quote.text }}"</p>
          </blockquote>
          <footer class="blockquote-footer">{{ quote.author }}</footer>
        </div>
        <div class="card-footer d-flex justify-content-between">
          <button class="btn btn-warning btn-sm" (click)="editQuote(quote)">
            <i class="fa-solid fa-pen me-1"></i>Edit
          </button>
          <button class="btn btn-danger btn-sm" (click)="deleteQuote(quote.id)">
            <i class="fa-solid fa-trash me-1"></i>Delete
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
